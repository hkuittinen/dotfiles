# Set space as the prefix key
unbind C-b
set -g prefix C-Space

# Fix colors
set -as terminal-features ",*:RGB"

# Pass focus events to programs (nvim FocusGained/checktime)
set -g focus-events on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded."

# Clear screen and scrollback
bind l send-keys C-l # \; clear-history

# Enable mouse actions
set -g mouse on
# Fix escape delay in vim
set -sg escape-time 0
# More history
set -g history-limit 100000
# Start window and pane numbering from 1
set -g base-index 1
set-window-option -g pane-base-index 1

# Sessions
bind n command-prompt -p "New session name:" "new-session -s '%%' -c ~"
bind . command-prompt -p "Rename session:" "rename-session '%%'"

# Windows
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -p "Rename window:" "rename-window '%%'"
# Reset session to exactly three windows: run, edit, terminal
bind w run-shell ~/.config/tmux/scripts/workspace.sh
set -g automatic-rename off
set-option -g renumber-windows on
# reorder
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Panes
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
## Fullscreen (zoom) the current pane
bind f resize-pane -Z
## Move
bind H swap-pane -U
bind J swap-pane -D
bind K swap-pane -U
bind L swap-pane -D
## Resize
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# Copy mode ( prefix -> [ )
set-window-option -g mode-keys vi
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel # "xsel --clipboard"

### Status bar
set -g status-position bottom
set -g status-left-length 80
set -g status-left " [#S] "
# Show date/time on wide clients (hidden on narrow/mobile screens)
set -g status-right "#{?#{e|>=:#{client_width},100},%a %d.%m.%Y %H:%M ,}"
set -g status-style bg=black,fg=colour28
set -g window-status-separator ""
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=colour28,fg=black] #I:#W "
# Toggle
bind m set-option -g status

### Default sessions
if-shell '! tmux has-session -t notes 2>/dev/null'    'new-session -d -s notes -c ~/notes'
if-shell '! tmux has-session -t dotfiles 2>/dev/null' 'new-session -d -s dotfiles -c ~/projects/dotfiles'
if-shell '! tmux has-session -t terminal 2>/dev/null' 'new-session -d -s terminal -c ~'

### Smart pane switching with awareness of Vim splits
# Pairs with nvim-tmux-navigation on the Neovim side.
# See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+
